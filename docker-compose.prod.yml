services:
  express_server:
    build:
      context: .
      target: runner
    image: express-api-server:latest
    container_name: express_server
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/express_api_db
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: express_server_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: express_api_db
    volumes:
      - express_server_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d express_api_db']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  express_server_postgres_data:
